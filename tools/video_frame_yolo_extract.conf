[extract]
# Required paths. Use forward slashes or escaped backslashes on Windows.
video = "C:/path/to/video.mp4"
output = "C:/datasets/video_extract"

# Optional YOLO model. Leave empty string only if you want empty label files with keep_empty = true.
model = "C:/path/to/plate.pt"

# plate: class 0 is number_plate
# vehicle: classes 1 bike, 2 car, 3 bus_microbus, 4 large_vehicle
task = "plate"

# Frames per second to inspect from the video.
fps = 5.0

# YOLO inference settings.
conf = 0.25
imgsz = 960
# Leave blank to auto-select cuda:0 when PyTorch can see the RTX GPU.
device = ""
batch = 16

# Set true when using a COCO vehicle model for vehicle extraction.
base_coco = false

# Keep image frames even when no labels are detected.
keep_empty = false

# Higher value skips more near-duplicate frames.
min_change = 6.0

jpg_quality = 92
